<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>产研虾 - ShrimPilot</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  body { background: #0f172a; color: #e2e8f0; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; }
  .dir-card { cursor: pointer; transition: all 0.2s; }
  .dir-card:hover { border-color: #475569; }
  .dir-detail { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
  .dir-detail.open { max-height: 600px; }
  .badge-go { background: rgba(34,197,94,0.15); color: #22c55e; }
  .badge-maybe { background: rgba(234,179,8,0.15); color: #eab308; }
  .badge-kill { background: rgba(239,68,68,0.15); color: #ef4444; }
  .filter-btn { padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid #334155; }
  .filter-btn.active { background: #334155; border-color: #475569; }
</style>
</head>
<body class="min-h-screen px-4 py-6 max-w-[430px] mx-auto">

<!-- Header -->
<div class="flex items-center gap-3 mb-4">
  <a href="./" class="text-slate-400 text-xl">&larr;</a>
  <h1 class="text-xl font-bold">🎯 产研虾 · 排行榜</h1>
</div>

<!-- Stats -->
<div class="grid grid-cols-3 gap-3 mb-4">
  <div class="card p-3 text-center">
    <div class="text-xl font-bold text-blue-400" id="totalCount">--</div>
    <div class="text-xs text-slate-400">总方向</div>
  </div>
  <div class="card p-3 text-center">
    <div class="text-xl font-bold text-green-400" id="goCount">--</div>
    <div class="text-xs text-slate-400">GO 候选</div>
  </div>
  <div class="card p-3 text-center">
    <div class="text-xl font-bold text-orange-400" id="topScore">--</div>
    <div class="text-xs text-slate-400">最高分</div>
  </div>
</div>

<!-- Filters -->
<div class="flex gap-2 mb-4 overflow-x-auto">
  <div class="filter-btn active" data-filter="all">全部</div>
  <div class="filter-btn" data-filter="go">GO</div>
  <div class="filter-btn" data-filter="maybe">MAYBE</div>
  <div class="filter-btn" data-filter="kill">KILL</div>
</div>

<!-- Sort -->
<div class="flex items-center justify-between mb-3">
  <span class="text-xs text-slate-500">按分数排序</span>
  <select id="sortBy" class="bg-transparent border border-slate-600 rounded px-2 py-1 text-xs text-slate-300">
    <option value="score">分数 ↓</option>
    <option value="name">名称</option>
  </select>
</div>

<!-- Direction List -->
<div id="dirList" class="space-y-3 mb-6"></div>

<div class="text-center text-xs text-slate-500 mb-4">
  数据来源: V7 Pipeline &middot; Pain Aggregator
</div>

<script>
let allDirs = [];

function getRecBadge(rec) {
  if (!rec) return '';
  const upper = rec.toUpperCase();
  if (upper.includes('GO')) return '<span class="px-2 py-0.5 rounded text-xs badge-go">GO</span>';
  if (upper.includes('MAYBE')) return '<span class="px-2 py-0.5 rounded text-xs badge-maybe">MAYBE</span>';
  if (upper.includes('KILL')) return '<span class="px-2 py-0.5 rounded text-xs badge-kill">KILL</span>';
  return `<span class="px-2 py-0.5 rounded text-xs bg-slate-600">${rec}</span>`;
}

function renderDirs(filter, sort) {
  let dirs = [...allDirs];

  if (filter !== 'all') {
    dirs = dirs.filter(d => {
      const r = (d.go_or_kill_recommendation || '').toUpperCase();
      return r.includes(filter.toUpperCase());
    });
  }

  if (sort === 'name') {
    dirs.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  } else {
    dirs.sort((a, b) => (b.weighted_score || 0) - (a.weighted_score || 0));
  }

  const el = document.getElementById('dirList');
  el.innerHTML = '';

  if (!dirs.length) {
    el.innerHTML = '<div class="card p-4 text-center text-slate-500">暂无产研方向数据</div>';
    return;
  }

  dirs.forEach((d, i) => {
    const score = d.weighted_score || 0;
    const ds = d.combined_d_scores || {};
    const dsHtml = ['d1','d2','d3','d4','d5','d6','d7','d8'].map((k, idx) => {
      const labels = ['社会传染','弱联系','身份表演','炫耀消费','Hook成瘾','Nudge','马斯洛','技术浪潮'];
      const max = [8,7,8,7,8,7,8,7];
      const v = ds[k] || 0;
      const pct = (v / max[idx] * 100).toFixed(0);
      return `<div class="flex items-center justify-between text-xs">
        <span class="text-slate-400">${labels[idx]}</span>
        <div class="flex items-center gap-2">
          <div class="w-16 h-1.5 rounded bg-slate-700"><div class="h-full rounded bg-blue-500" style="width:${pct}%"></div></div>
          <span class="w-8 text-right">${v}/${max[idx]}</span>
        </div>
      </div>`;
    }).join('');

    const comps = (d.competitors || []).map(c => `${c.name}(${c.weakness || ''})`).join(', ') || '暂无';

    el.innerHTML += `
      <div class="card dir-card" onclick="this.querySelector('.dir-detail').classList.toggle('open')">
        <div class="p-4">
          <div class="flex items-start justify-between mb-1">
            <div class="flex items-center gap-2">
              <span class="text-slate-500 text-sm">#${i + 1}</span>
              <span class="font-semibold text-sm">${d.name || '未命名'}</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-orange-400 font-mono font-bold">⚡${score.toFixed(0)}</span>
              ${getRecBadge(d.go_or_kill_recommendation)}
            </div>
          </div>
          <p class="text-xs text-slate-400 mb-2">${d.one_liner || ''}</p>
          <div class="flex gap-2 text-xs text-slate-500">
            <span>👤 ${d.target_user || '--'}</span>
          </div>
        </div>
        <div class="dir-detail">
          <div class="px-4 pb-4 border-t border-slate-700 pt-3 space-y-3">
            <div>
              <div class="text-xs font-semibold text-slate-400 mb-1">解决什么问题</div>
              <div class="text-xs text-slate-300">${d.problem_statement || '--'}</div>
            </div>
            <div>
              <div class="text-xs font-semibold text-slate-400 mb-1">价值主张</div>
              <div class="text-xs text-slate-300">${d.value_proposition || '--'}</div>
            </div>
            <div>
              <div class="text-xs font-semibold text-slate-400 mb-1">市场规模</div>
              <div class="text-xs text-slate-300">${d.tam_estimate || '--'}</div>
            </div>
            <div>
              <div class="text-xs font-semibold text-slate-400 mb-1">竞对</div>
              <div class="text-xs text-slate-300">${comps}</div>
            </div>
            <div>
              <div class="text-xs font-semibold text-slate-400 mb-1">MVP 范围</div>
              <div class="text-xs text-slate-300">${d.mvp_scope || '--'}</div>
            </div>
            <div>
              <div class="text-xs font-semibold text-slate-400 mb-2">D1-D8 评分</div>
              <div class="space-y-1.5">${dsHtml}</div>
            </div>
          </div>
        </div>
      </div>`;
  });
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderDirs(btn.dataset.filter, document.getElementById('sortBy').value);
  });
});

document.getElementById('sortBy').addEventListener('change', (e) => {
  const activeFilter = document.querySelector('.filter-btn.active')?.dataset.filter || 'all';
  renderDirs(activeFilter, e.target.value);
});

async function load() {
  const data = await fetch('api/research').then(r => r.json()).catch(() => []);
  allDirs = Array.isArray(data) ? data : [];

  document.getElementById('totalCount').textContent = allDirs.length;
  const goList = allDirs.filter(d => (d.go_or_kill_recommendation || '').toUpperCase().includes('GO'));
  document.getElementById('goCount').textContent = goList.length;
  const topS = allDirs.length ? Math.max(...allDirs.map(d => d.weighted_score || 0)) : 0;
  document.getElementById('topScore').textContent = topS.toFixed(0);

  renderDirs('all', 'score');
}

load();
</script>
</body>
</html>
